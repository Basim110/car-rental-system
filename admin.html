<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeDrive Admin - Dashboard</title>

    <script>
        (function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const role = sessionStorage.getItem('role');

            if (isLoggedIn !== 'true' || role !== 'admin') {
                alert("Access Denied: Admin privileges required.");
                window.location.href = "login.html"; 
            }
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light p-4">

    <div class="d-flex justify-content-between align-items-center bg-dark text-white p-3 rounded shadow-sm mb-4">
        <h4 class="m-0"><i class="bi bi-shield-lock-fill text-warning"></i> Admin Panel</h4>
        <div>
            <a href="index.html" class="btn btn-sm btn-outline-light me-2">View Site</a>
            <button onclick="logoutAdmin()" class="btn btn-sm btn-danger">Logout</button>
        </div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-md-4"><div class="card bg-primary text-white p-3 shadow-sm border-0">Fleet: <span id="statFleet" class="fw-bold fs-4">0</span></div></div>
        <div class="col-md-4"><div class="card bg-success text-white p-3 shadow-sm border-0">Bookings: <span id="statBooks" class="fw-bold fs-4">0</span></div></div>
        <div class="col-md-4"><div class="card bg-dark text-warning p-3 shadow-sm border-0">Potential Rev: Rs.<span id="statRev" class="fw-bold fs-4">0</span></div></div>
    </div>

    <div class="d-flex justify-content-between mb-3 align-items-center">
        <h4 class="fw-bold">Manage Vehicles</h4>
        <button class="btn btn-warning fw-bold" onclick="openAddModal()">+ Add New Car</button>
    </div>
    
    <table class="table bg-white shadow-sm mb-5 rounded align-middle">
        <thead class="table-dark">
            <tr>
                <th>Car Name</th>
                <th>Price/Day</th>
                <th class="text-center">Action</th>
            </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>

    <h4 class="fw-bold">Rental Requests</h4>
    <table class="table bg-white shadow-sm rounded align-middle">
        <thead class="table-light">
            <tr>
                <th>Customer</th>
                <th>Car</th>
                <th>Rental Dates</th> 
                <th>Total Price</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="bookingsTable"></tbody>
    </table>

    <div class="modal fade" id="carModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white"><h5 id="modalTitle">Add New Vehicle</h5></div>
                <div class="modal-body">
                    <form id="adminForm">
                        <input type="hidden" id="editCarId"> 
                        <input type="text" id="newCarName" class="form-control mb-3" placeholder="Car Name" required>
                        <input type="text" id="newCarBrand" class="form-control mb-3" placeholder="Brand (e.g. Toyota)" required>
                        <input type="number" id="newCarPrice" class="form-control mb-3" placeholder="Daily Price (PKR)" required>
                        <input type="file" id="carImageFile" class="form-control mb-3" accept="image/*">
                        <div id="previewWrap" class="d-none text-center bg-light p-2 rounded">
                            <img id="livePreview" src="" style="width:100%; max-height:180px; object-fit:cover; border-radius:8px;">
                            <button type="button" class="btn btn-sm btn-danger mt-2" onclick="removeImg()">Remove Image</button>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="saveBtn" class="btn btn-warning" onclick="saveCar()">Save to Fleet</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
    <script>
        function logoutAdmin() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
