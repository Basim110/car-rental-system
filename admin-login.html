<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - LuxeDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: #121212; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .admin-card {
            background: #ffffff;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #dc3545;
        }
    </style>
</head>
<body>

    <div class="admin-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <div class="display-6 text-danger mb-2">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h3 class="fw-bold text-dark">Staff Access Only</h3>
            <p class="text-muted small">Unauthorized access is strictly prohibited</p>
        </div>

        <form id="adminLoginForm">
            <div class="mb-3">
                <label class="form-label fw-bold small">Admin Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" id="adminUsername" class="form-control border-start-0" required placeholder="Employee ID">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Security Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                    <input type="password" id="adminPassword" class="form-control border-start-0" required placeholder="••••••••">
                </div>
            </div>

            <div id="adminError" class="alert alert-danger py-2 small d-none">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Access Denied: Invalid Admin Credentials.
            </div>

            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mt-2">
                Secure Login <i class="bi bi-arrow-right-short"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-decoration-none text-muted small">
                <i class="bi bi-house-door"></i> Exit to Public Site
            </a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
