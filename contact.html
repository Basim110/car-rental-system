<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LuxeDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-speedometer"></i> LuxeDrive</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="cars.html">Rental Cars</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
                <a href="admin.html" class="btn btn-warning ms-3 fw-bold">Admin Panel</a>
            </div>
        </div>
    </nav>

    <div class="bg-dark text-white text-center py-5">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="lead">We'd love to hear from you. Get in touch today.</p>
    </div>

    <div class="container my-5">
        <div class="row g-5">
            <div class="col-md-5">
                <h3 class="fw-bold mb-4">Get In Touch</h3>
                <div class="d-flex mb-4">
                    <div class="bg-warning text-dark p-3 rounded-circle me-3" style="width: 50px; height: 50px; display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-geo-alt fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1">Our Location</h5>
                        <p class="text-muted mb-0">model town A Bahawalpur</p>
                    </div>
                </div>

                <div class="d-flex mb-4">
                    <div class="bg-warning text-dark p-3 rounded-circle me-3" style="width: 50px; height: 50px; display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-envelope fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1">Email Us</h5>
                        <p class="text-muted mb-0">info@luxedrive.com</p>
                    </div>
                </div>

                <div class="d-flex mb-4">
                    <div class="bg-warning text-dark p-3 rounded-circle me-3" style="width: 50px; height: 50px; display:flex; align-items:center; justify-content:center;">
                        <i class="bi bi-telephone fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1">Call Us</h5>
                        <p class="text-muted mb-0">03000023456</p>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card border-0 shadow-lg p-4">
                    <h3 class="fw-bold mb-4">Send a Message</h3>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control bg-light border-0" placeholder="firstname">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control bg-light border-0" placeholder="lastname">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control bg-light border-0" placeholder="name@example.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control bg-light border-0" placeholder="Rental Inquiry">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control bg-light border-0" rows="5" placeholder="How can we help you?"></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-warning fw-bold px-5 py-2">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
