<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - LuxeDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow-sm border-0" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">User Login</h2>
                <p class="text-muted">Welcome back to LuxeDrive</p>
            </div>
            <form id="userLoginForm">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter your username">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                </div>
                <div id="loginError" class="text-danger small mb-3 d-none">Invalid credentials.</div>
                <button type="submit" class="btn btn-dark w-100 fw-bold">Login to Account</button>
            </form>
            <div class="text-center mt-3">
                <p class="small text-muted">Don't have an account? <a href="signup.html" class="text-warning fw-bold">Sign Up</a></p>
                <hr>
                <a href="index.html" class="text-muted small text-decoration-none">Back to Website</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
